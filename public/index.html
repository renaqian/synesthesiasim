<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synesthesia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #222222;
      --text: #e8e8e8;
      --muted: #555555;
      --accent: #7c6aff;
      --accent-dim: rgba(124, 106, 255, 0.12);
      --danger: #ff4f4f;
      --radius: 8px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 40px;
    }

    header { text-align: center; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    header p {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #333;
      letter-spacing: 0.1em;
    }

    #dropzone {
      width: 100%;
      max-width: 520px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    #dropzone:hover, #dropzone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    #dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #dropzone .icon {
      font-size: 2rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    #dropzone p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    #dropzone p span { color: var(--accent); }

    #upload-status {
      font-size: 0.8rem;
      height: 18px;
      color: var(--muted);
      text-align: center;
    }

    #upload-status.success { color: #4fdb8f; }
    #upload-status.error   { color: var(--danger); }

    #library { width: 100%; max-width: 520px; }

    #library h2 {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    #file-list { display: flex; flex-direction: column; gap: 6px; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      transition: border-color 0.15s;
    }

    .file-item:hover { border-color: #333; }

    .file-item .name {
      flex: 1;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .file-item button {
      border: none;
      border-radius: 4px;
      font-size: 0.75rem;
      padding: 5px 10px;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
    }

    .file-item button:hover { opacity: 0.75; }
    .btn-play { background: var(--accent); color: #fff; }

    .btn-pause {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border) !important;
    }

    .btn-delete:hover {
      color: var(--danger) !important;
      border-color: var(--danger) !important;
    }

    #canvas-wrap {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #000;
    }
    #canvas-wrap.active { display: block; }
    #vis-canvas { width: 100%; height: 100%; display: block; }

    #canvas-controls {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    }
    #canvas-controls button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-family: var(--font);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 8px 18px;
    border-radius: 40px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.15s;
    }
    #canvas-controls button:hover { background: rgba(255,255,255,0.14); }

    #now-playing {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
    }

    #freq-display { width: 100%; max-width: 520px; }
    #freq-display h2 {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    }
    .freq-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .freq-label { font-size: 0.75rem; color: var(--muted); width: 36px; }
    .freq-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .freq-bar { height: 100%; width: 0%; border-radius: 2px; transition: width 0.05s ease-out; }
    #bar-bass  { background: #7c6aff; }
    #bar-mids  { background: #4fdb8f; }
    #bar-highs { background: #ff8c4f; }
    .freq-value { font-size: 0.75rem; color: var(--muted); width: 28px; text-align: right; }
        .btn-delete {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border) !important;
        }

    .empty-state {
      font-size: 0.8rem;
      color: #2a2a2a;
      text-align: center;
      padding: 24px 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Synesthesia</h1>
    <p>sound → colour → form</p>
  </header>

  <div id="dropzone">
    <input type="file" accept=".mp3,audio/mpeg" id="file-input" />
    <div class="icon">♫</div>
    <p>Drop an MP3 here<br /><span>or click to browse</span></p>
  </div>

  <div id="upload-status"></div>

  <section id="library">
    <h2>Audio Library</h2>
    <div id="file-list"></div>
  </section>

  <section id="freq-display">
    <h2>Frequencies</h2>
    <div class="freq-row">
        <span class="freq-label">Bass</span>
        <div class="freq-bar-wrap"><div class="freq-bar" id="bar-bass"></div></div>
        <span class="freq-value" id="val-bass">0.0</span>
    </div>
    <div class="freq-row">
        <span class="freq-label">Mids</span>
        <div class="freq-bar-wrap"><div class="freq-bar" id="bar-mids"></div></div>
        <span class="freq-value" id="val-mids">0.0</span>
    </div>
    <div class="freq-row">
        <span class="freq-label">Highs</span>
        <div class="freq-bar-wrap"><div class="freq-bar" id="bar-highs"></div></div>
        <span class="freq-value" id="val-highs">0.0</span>
    </div>
  </section>

    <div id="canvas-wrap">
    <canvas id="vis-canvas"></canvas>
    <div id="now-playing"></div>
    <div id="canvas-controls">
        <button onclick="pauseFile()">Pause / Resume</button>
        <button onclick="closeVisualizer()">Close</button>
    </div>
    </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const statusEl = document.getElementById('upload-status');
    const fileList = document.getElementById('file-list');

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) uploadFile(fileInput.files[0]);
    });

    async function uploadFile(file) {
      if (!file.name.endsWith('.mp3')) {
        setStatus('Only MP3 files are supported.', 'error');
        return;
      }

      setStatus('Uploading…', '');

      const formData = new FormData();
      formData.append('mp3', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        setStatus(`Uploaded: ${data.filename}`, 'success');
        loadFiles();
      } catch (err) {
        setStatus(`Upload failed: ${err.message}`, 'error');
      }

      fileInput.value = '';
    }

    async function loadFiles() {
      try {
        const res = await fetch('/files');
        const files = await res.json();

        fileList.innerHTML = '';

        if (files.length === 0) {
          fileList.innerHTML = '<p class="empty-state">No audio files yet — upload one above.</p>';
          return;
        }

        files.forEach(filename => {
          const item = document.createElement('div');
          item.className = 'file-item';
          item.innerHTML = `
            <span class="name" title="${filename}">${filename}</span>
            <button class="btn-play" onclick="playFile('${filename}')">Play</button>
            <button class="btn-pause" onclick="pauseFile()">Pause</button>
            <button class="btn-delete" onclick="deleteFile('${filename}', this)">Delete</button>
          `;
          fileList.appendChild(item);
        });
      } catch (err) {
        fileList.innerHTML = '<p class="empty-state">Could not load files.</p>';
      }
    }
            
    const canvasWrap = document.getElementById('canvas-wrap');
    const canvas     = document.getElementById('vis-canvas');
    const ctx        = canvas.getContext('2d');

    let audioCtx    = null;
    let analyser    = null;
    let source      = null;
    let dataArray   = null;
    let animFrameId = null;

    let prevBass      = 0;
    let prevMids      = 0;
    let energyHistory = new Array(60).fill(0);

    let sBass      = 0;
    let sMids      = 0;
    let sHighs     = 0;
    let flashAlpha = 0;
    let shapeAngle = 0;

    async function playFile(filename) {
        if (source) { source.stop(); source = null; }
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }

        setStatus(`Loading: ${filename}`, '');

        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        const res         = await fetch(`/audiofiles/${encodeURIComponent(filename)}`);
        const arrayBuffer = await res.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

        analyser         = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        dataArray        = new Uint8Array(analyser.frequencyBinCount);

        source        = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        source.start(0);

        source.onended = () => { closeVisualizer(); setStatus('', ''); };

        setStatus(`Playing: ${filename}`, 'success');
        document.getElementById('now-playing').textContent = filename.replace('.mp3', '');

        prevBass = prevMids = sBass = sMids = sHighs = flashAlpha = 0;
        energyHistory.fill(0);

        openVisualizer();
        animFrameId = requestAnimationFrame(tick);
    }


    function openVisualizer() {
        resizeCanvas();
        canvasWrap.classList.add('active');
    }

    function closeVisualizer() {
        canvasWrap.classList.remove('active');
        if (source) { try { source.stop(); } catch(e) {} source = null; }
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    }

    function resizeCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    function avg(arr, start, end) {
        let sum = 0;
        for (let i = start; i < end; i++) sum += arr[i];
        return sum / (end - start);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick() {
        animFrameId = requestAnimationFrame(tick);
        if (!analyser) return;

        analyser.getByteFrequencyData(dataArray);

        const rawBass  = avg(dataArray, 0, 10);
        const rawMids  = avg(dataArray, 10, 150);
        const rawHighs = avg(dataArray, 150, 400);

        sBass  = lerp(sBass,  rawBass,  0.15);
        sMids  = lerp(sMids,  rawMids,  0.12);
        sHighs = lerp(sHighs, rawHighs, 0.2);

        const bassDelta = rawBass - prevBass;
        const midsDelta = rawMids - prevMids;
        const isBeat    = bassDelta > 18;
        const isMidHit  = midsDelta > 12;
        prevBass = rawBass;
        prevMids = rawMids;

        energyHistory.push(rawBass);
        energyHistory.shift();
        const recentAvg = energyHistory.reduce((a, b) => a + b, 0) / energyHistory.length;
        const isDrop    = rawBass > recentAvg * 2.2 && rawBass > 60;

        if (isDrop) flashAlpha = 0.35;
        flashAlpha = Math.max(0, flashAlpha - 0.018);

        document.getElementById('bar-bass').style.width  = `${(rawBass  / 255) * 100}%`;
        document.getElementById('bar-mids').style.width  = `${(rawMids  / 255) * 100}%`;
        document.getElementById('bar-highs').style.width = `${(rawHighs / 255) * 100}%`;
        document.getElementById('val-bass').textContent  = rawBass.toFixed(1);
        document.getElementById('val-mids').textContent  = rawMids.toFixed(1);
        document.getElementById('val-highs').textContent = rawHighs.toFixed(1);

        drawBackground(sBass);
        drawShapes(sMids, isMidHit);
        drawLines(sHighs, rawHighs, isBeat, bassDelta);
        drawFlash(flashAlpha, isDrop);
        }

        function drawBackground(smoothBass) {
        const W = canvas.width;
        const H = canvas.height;

        ctx.fillStyle = 'rgba(8, 8, 8, 0.18)';
        ctx.fillRect(0, 0, W, H);

        const hue = 260 - (smoothBass / 255) * 140;
        const sat = 40  + (smoothBass / 255) * 35;
        const lit = 8   + (smoothBass / 255) * 10;

        const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.75);
        grad.addColorStop(0,   `hsla(${hue}, ${sat}%, ${lit + 8}%, 0.55)`);
        grad.addColorStop(0.5, `hsla(${hue - 20}, ${sat}%, ${lit}%, 0.25)`);
        grad.addColorStop(1,   'transparent');

        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
    }

    function drawShapes(smoothMids, isMidHit) {
        const W  = canvas.width;
        const H  = canvas.height;
        const cx = W / 2;
        const cy = H / 2;

        shapeAngle += 0.003 + (smoothMids / 255) * 0.012;

        const sides   = Math.round(3 + (smoothMids / 255) * 5);
        const radius  = 80 + (smoothMids / 255) * Math.min(W, H) * 0.22;
        const distort = isMidHit ? 0.35 : 0.08;
        const hue     = 180 + (smoothMids / 255) * 80;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(shapeAngle);

        ctx.strokeStyle = `hsla(${hue}, 70%, 65%, 0.18)`;
        ctx.lineWidth   = 1;
        ctx.beginPath();
        for (let i = 0; i <= sides; i++) {
            const angle = (i / sides) * Math.PI * 2;
            const r = radius * (1 + Math.sin(shapeAngle * 3 + i) * distort);
            const x = Math.cos(angle) * r;
            const y = Math.sin(angle) * r;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();

        ctx.strokeStyle = `hsla(${hue}, 80%, 70%, 0.55)`;
        ctx.lineWidth   = isMidHit ? 2 : 1;
        ctx.beginPath();
        for (let i = 0; i <= sides; i++) {
            const angle = (i / sides) * Math.PI * 2;
            const r = radius * 0.55 * (1 + Math.sin(shapeAngle * 5 + i * 1.3) * distort * 0.6);
            const x = Math.cos(angle) * r;
            const y = Math.sin(angle) * r;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();

        ctx.restore();
    }

    function drawLines(smoothHighs, rawHighs, isBeat, beatIntensity) {
        const W  = canvas.width;
        const H  = canvas.height;
        const cx = W / 2;
        const cy = H / 2;

        const lineCount = isBeat
            ? Math.floor(12 + beatIntensity * 0.8)
            : Math.floor(4 + (smoothHighs / 255) * 8);

        const len    = 60 + (smoothHighs / 255) * Math.min(W, H) * 0.35;
        const jagged = isBeat ? 0.7 : 0.1 + (rawHighs / 255) * 0.25;
        const hue    = 30  + (rawHighs / 255) * 60;
        const alpha  = 0.15 + (smoothHighs / 255) * 0.55;

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        for (let i = 0; i < lineCount; i++) {
            const baseAngle = (i / lineCount) * Math.PI * 2 + shapeAngle * 0.4;

            ctx.strokeStyle = `hsla(${hue + i * 8}, 85%, 70%, ${alpha})`;
            ctx.lineWidth   = isBeat ? 1.5 : 0.8;
            ctx.beginPath();

            let x = cx;
            let y = cy;
            ctx.moveTo(x, y);

            const segments = isBeat ? 8 : 4;
            for (let s = 0; s < segments; s++) {
            const jitter = (Math.random() - 0.5) * jagged * len * 0.4;
            const segLen = len / segments;
            x += Math.cos(baseAngle + jitter * 0.05) * segLen + (Math.random() - 0.5) * jitter;
            y += Math.sin(baseAngle + jitter * 0.05) * segLen + (Math.random() - 0.5) * jitter;
            ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();
    }

    function drawFlash(alpha, isDrop) {
        if (alpha <= 0) return;

        const hue = isDrop ? 270 : 200;
        ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function readFrequencies() {
        if (!analyser) return;

        const bufferLength = analyser.frequencyBinCount;  // always fftSize / 2 = 1024
        const dataArray = new Uint8Array(bufferLength);   // values 0-255 per bin
    }

    function average(dataArray, start, end) {
        let sum = 0;
        for (let i = start; i < end; i++) sum += dataArray[i];
        return sum / (end - start);
    }

    function pauseFile(filename, btn){
        if (!audioCtx) return;

        if (audioCtx.state == 'running'){
            audioCtx.suspend();
            setStatus('Paused', '');
        } else if (audioCtx.state == 'suspended'){
            audioCtx.resume();
            setStatus('Resumed', '');
        }
    }

    async function deleteFile(filename, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        setStatus(`Deleted: ${filename}`, '');
        loadFiles();
      } catch (err) {
        setStatus(err.message, 'error');
        btn.disabled = false;
      }
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    loadFiles();
  </script>

</body>
</html>
